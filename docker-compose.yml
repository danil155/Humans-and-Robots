version: '3.8'

services:
  backend:
    build: ./backend
    container_name: solver-backend-dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - solver-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: solver-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    command: npm start
    depends_on:
      - backend
    networks:
      - solver-network

networks:
  solver-network:
    driver: bridge
